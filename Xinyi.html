<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>致林心仪</title>
  <style>
    /* 通用重置 */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* 核心样式：使用更通用的字体，防止文字不显示 */
    body {
      background: linear-gradient(135deg, #ffafbd, #f9d4e0, #c9e6ff);
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      /* 优先使用系统自带的楷体，如果没有则用衬线体 */
      font-family: "KaiTi", "STKaiti", "BiauKai", "DFKai-SB", serif;
      position: relative;
      color: #fff;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* 爱心文字容器 */
    .heart-container {
      position: relative;
      width: 300px; height: 260px;
      z-index: 2;
    }

    /* 单个文字样式：加大描边，防止看不清 */
    .heart-text {
      position: absolute;
      font-size: 28px;
      font-weight: 900;
      color: #d81b60; /* 深粉色，更显眼 */
      text-shadow:
        2px 2px 0 #fff,
        -1px -1px 0 #fff,
        1px -1px 0 #fff,
        -1px 1px 0 #fff,
        0 0 10px rgba(255,255,255,0.8);
      animation: heartbeat 2s infinite ease-in-out;
      opacity: 0; /* 初始隐藏，由JS控制显示 */
      transform: scale(0);
    }

    /* 底部文字 */
    .message {
      position: absolute;
      bottom: 50px;
      width: 100%;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #880e4f;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
      z-index: 2;
      opacity: 0;
      animation: fadeIn 2s 1s forwards;
    }

    /* 音乐按钮 */
    .music-btn {
      position: absolute;
      top: 20px; right: 20px;
      width: 50px; height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid #ff4081;
      color: #ff4081;
      font-size: 24px;
      line-height: 46px;
      text-align: center;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      animation: rotate 3s linear infinite;
    }

    /* 动画定义 */
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* 手机端适配 */
    @media (max-width: 600px) {
      .heart-text { font-size: 22px; }
      .message { font-size: 18px; bottom: 30px; }
    }
  </style>
</head>
<body>

  <!-- 音乐标签（使用免费版权音乐或你自己的链接） -->
  <audio id="bgMusic" loop src="https://music.163.com/song/media/outer/url?id=534949644.mp3"></audio>

  <!-- 音乐按钮 -->
  <div class="music-btn" onclick="playMusic()">♫</div>

  <!-- 爱心文字容器 -->
  <div class="heart-container" id="heartContainer"></div>

  <!-- 底部告白语 -->
  <div class="message">愿意做我女朋友吗？</div>

  <canvas id="canvas"></canvas>

  <script>
    // --- 1. 音乐控制 ---
    const audio = document.getElementById('bgMusic');
    function playMusic() {
      if (audio.paused) {
        audio.play();
        alert("🎵 音乐已开启：慢慢喜欢你");
      } else {
        audio.pause();
      }
    }

    // --- 2. 生成爱心文字 ---
    const words = "林心仪我爱你"; // 这里已经改成了“仪”
    const container = document.getElementById('heartContainer');
    const len = words.length;

    // 爱心曲线公式
    // x = 16sin^3(t)
    // y = 13cos(t) - 5cos(2t) - 2cos(3t) - cos(4t)

    for (let i = 0; i < len; i++) {
      const span = document.createElement('span');
      span.className = 'heart-text';
      span.innerText = words[i];

      // 计算每个字的位置 (0 到 2PI)
      // 为了让字分布均匀，我们稍微调整一下 t 的步长
      const t = (i / len) * Math.PI * 2;

      // 爱心参数方程计算
      // 缩放系数 10 用于调整大小，x+15, y+10 用于居中
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)); // y轴取反，因为屏幕坐标系向下为正

      // 设置位置
      // 这里的系数 12 是控制爱心大小的关键，可以根据需要调整
      const scale = 12;
      span.style.left = `calc(50% + ${x * scale}px)`;
      span.style.top = `calc(50% + ${y * scale}px)`;

      // 设置延迟动画，让字一个个蹦出来
      span.style.animationDelay = `${i * 0.2}s`;
      span.style.opacity = 1; // 直接显示，或者配合动画
      span.style.transform = 'scale(1)'; // 初始状态

      container.appendChild(span);
    }

    // --- 3. 背景粒子效果 ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    const particles = [];
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 3 + 1,
        color: `rgba(255, ${Math.floor(Math.random()*100)}, ${Math.floor(Math.random()*100)}, ${Math.random() * 0.5 + 0.2})`,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5
      });
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > width) p.vx *= -1;
        if (p.y < 0 || p.y > height) p.vy *= -1;
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
